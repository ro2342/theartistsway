<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#f3ead9" />
  <title>The Artist's Way — Companheiro</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <script>
    // TEMPORÁRIO (branch de diagnóstico, servido via GitHub Pages): força
    // busca fresca de cada arquivo, sem cache -- o WebView do Lumia estava
    // servindo JS/CSS antigos do cache mesmo com o app reinstalado.
    document.write('<link rel="stylesheet" href="./css/style.css?v=' + Date.now() + '" />');
  </script>
</head>
<body>
  <div class="spiral-bar"></div>
  <div id="app"></div>

  <script>
    (function () {
      var v = Date.now();
      ["data", "db", "notifications", "calendar", "app"].forEach(function (name) {
        document.write('<script src="./js/' + name + '.js?v=' + v + '"><\/script>');
      });
    })();
  </script>
</body>
</html>
