name: 03 - Publicar o PWA no GitHub Pages

# Publica o conteúdo de www/ como o site em https://ro2342.github.io/theartistsway/
# a cada push que mexer nessa pasta -- separado do workflow que gera o
# .appxbundle (esse aqui não builda nada, só copia os arquivos estáticos).
on:
  push:
    branches: [main]
    paths:
      - "www/**"
      - ".github/workflows/03-deploy-pwa-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v5

      - name: Empacotar www/ como artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: www

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
