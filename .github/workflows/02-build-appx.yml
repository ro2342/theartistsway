name: 02 - Build do appxbundle (Windows 10 Mobile)

# Roda automaticamente a cada push que mexer na pasta uwp/ ou www/, e também
# pode ser disparado manualmente pela aba Actions. Gera o .appxbundle pronto
# pra sideload no Lumia — disponível como artefato do workflow ao final.
on:
  push:
    branches: [main]
    paths:
      - "uwp/**"
      - "www/**"
      - ".github/workflows/02-build-appx.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Verificar se o certificado de sideload já existe
        shell: pwsh
        run: |
          $pfx = "uwp/ArtistWayUWP/ArtistWayUWP_TemporaryKey.pfx"
          if (-not (Test-Path $pfx)) {
            Write-Error "Certificado não encontrado em $pfx. Rode primeiro o workflow '01 - Gerar certificado de assinatura' na aba Actions (botão Run workflow), espere terminar, e então rode este de novo."
            exit 1
          }

      - name: Configurar MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Instalar o Windows 10 SDK 17763 (metadados do UWP)
        uses: GuillaumeFalourd/setup-windows10-sdk-action@v2.4
        with:
          sdk-version: 17763

      - name: Restaurar pacotes NuGet e compilar o appxbundle
        shell: cmd
        run: |
          msbuild uwp\ArtistWayUWP\ArtistWayUWP.csproj ^
            /restore ^
            /p:Configuration=Release ^
            /p:Platform=ARM ^
            /p:AppxBundlePlatforms=ARM ^
            /p:AppxBundle=Always ^
            /p:UapAppxPackageBuildMode=SideloadOnly ^
            /p:UseDotNetNativeToolchain=true ^
            /p:AppxPackageSigningEnabled=true ^
            /p:PackageCertificateKeyFile=ArtistWayUWP_TemporaryKey.pfx ^
            /p:PackageCertificatePassword=ArtistWay2026! ^
            /p:AppxPackageDir=%CD%\AppPackages\ ^
            /verbosity:minimal

      - name: Publicar o appxbundle como artefato
        uses: actions/upload-artifact@v4
        with:
          name: artistway-appxbundle
          path: AppPackages/**
          if-no-files-found: error

      - name: Publicar o appxbundle em app/ (link estável pro GitHub Pages)
        shell: pwsh
        run: |
          $bundle = Get-ChildItem -Path AppPackages -Recurse -Filter *.appxbundle | Select-Object -First 1
          if (-not $bundle) {
            Write-Error "Nenhum .appxbundle encontrado em AppPackages."
            exit 1
          }
          New-Item -ItemType Directory -Force -Path app | Out-Null
          Copy-Item $bundle.FullName -Destination "app/app.appxbundle" -Force
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/app.appxbundle
          git diff --cached --quiet -- app/app.appxbundle
          if ($LASTEXITCODE -eq 0) {
            Write-Host "app.appxbundle já está atualizado, nada para commitar."
          } else {
            git commit -m "chore: atualiza app/app.appxbundle (automático)"
            git push
          }
